name: Deploy Nebula Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup with npm cache ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 3. Full install + build on GitHub's 7 GB runner ──────────────────────
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        # esbuild → dist/server.js

      # ── 5. Pack compiled output and manifests (no node_modules) ────────────────
      #   Keeping the tarball tiny (~60KB) ensures an instant SCP upload.
      - name: Create deployment tarball
        run: |
          tar -czf deploy.tar.gz \
            dist \
            package.json \
            package-lock.json

      # ── 6. Upload tarball to VPS ──────────────────────────────────────────────
      - name: Copy bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/nebula-deploy-tmp/"

      # ── 7. SSH: extract, smart-install dependencies, restart PM2 ─────────────
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            # Locate project directory
            TARGET_DIR=$(find $HOME -maxdepth 3 -type d -name "nebula-server" -print -quit 2>/dev/null)
            if [ -z "$TARGET_DIR" ]; then
              echo "Error: Could not find nebula-server directory in $HOME"
              exit 1
            fi
            echo "Deploying to: $TARGET_DIR"

            # Extract tarball into target directory (overwrites dist/ and package manifests)
            tar -xzf ~/nebula-deploy-tmp/deploy.tar.gz -C "$TARGET_DIR"
            rm -f ~/nebula-deploy-tmp/deploy.tar.gz

            cd "$TARGET_DIR"

            # Load NVM so npm is available
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Smart Dependency Sync:
            # Only run npm install if package-lock.json has changed.
            NEW_HASH=$(md5sum package-lock.json | awk '{print $1}')
            OLD_HASH=""
            if [ -f .package-lock.hash ]; then
              OLD_HASH=$(cat .package-lock.hash)
            fi

            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              echo "package-lock.json changed. Installing production dependencies..."
              npm install --omit=dev
              echo "$NEW_HASH" > .package-lock.hash
            else
              echo "Dependencies are unchanged. Skipping npm install."
            fi

            # Restart (or start) PM2
            if pm2 list | grep -q "nebula-server"; then
              pm2 restart nebula-server --update-env
              echo "Deployment complete — PM2 restarted."
            else
              echo "PM2 process not found — starting for the first time..."
              pm2 start "$TARGET_DIR/dist/server.js" \
                --name "nebula-server" \
                --node-args="--max-old-space-size=512"
              pm2 save
              echo "Deployment complete — PM2 process started."
            fi
