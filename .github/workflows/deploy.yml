name: Deploy Nebula Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup with npm cache ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Full install + build on GitHub's 7 GB runner ──────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # esbuild → dist/server.js (packages=external, so node_modules still
        # needed at runtime — but we let the VPS install only prod deps below)

      # ── 4. Pack only the compiled output + manifests (no node_modules) ───────
      #   Keeping the tarball small means a fast SCP upload every deploy.
      - name: Create deployment tarball
        run: |
          tar -czf deploy.tar.gz \
            dist \
            package.json \
            package-lock.json

      # ── 5. Upload tarball to VPS ──────────────────────────────────────────────
      - name: Copy bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/nebula-deploy-tmp/"

      # ── 6. SSH: extract, install prod deps only, restart PM2 ─────────────────
      #   npm ci --omit=dev is now cheap: no puppeteer, no Chromium download,
      #   only small runtime packages. No TypeScript compilation happens here.
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            # Locate project directory
            TARGET_DIR=$(find $HOME -maxdepth 3 -type d -name "nebula-server" -print -quit 2>/dev/null)
            if [ -z "$TARGET_DIR" ]; then
              echo "Error: Could not find nebula-server directory in $HOME"
              exit 1
            fi
            echo "Deploying to: $TARGET_DIR"

            # Extract tarball into project directory (overwrites dist/ in-place)
            tar -xzf ~/nebula-deploy-tmp/deploy.tar.gz -C "$TARGET_DIR"
            rm -f ~/nebula-deploy-tmp/deploy.tar.gz

            cd "$TARGET_DIR"

            # Load NVM so npm is available
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Install/sync production dependencies only.
            # No devDeps (esbuild, typescript, tsx, etc.) — nothing to compile.
            # npm picks the correct native binaries for this platform.
            echo "Syncing production dependencies..."
            npm ci --omit=dev

            # Restart (or start) PM2
            if pm2 list | grep -q "nebula-server"; then
              pm2 restart nebula-server --update-env
              echo "Deployment complete — PM2 restarted."
            else
              echo "PM2 process not found — starting for the first time..."
              pm2 start "$TARGET_DIR/dist/server.js" \
                --name "nebula-server" \
                --node-args="--max-old-space-size=512"
              pm2 save
              echo "Deployment complete — PM2 process started."
            fi
