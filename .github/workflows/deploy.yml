name: Deploy Nebula Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup with npm cache ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Full install + build on GitHub's 7 GB runner ──────────────────────
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        # esbuild → dist/server.js

      # ── 4. Prune to production-only deps (drops devDependencies) ──────────────
      - name: Prune devDependencies
        run: npm prune --production

      # ── 5. Pack compiled output, prod node_modules, and manifests ─────────────
      #   We bundle node_modules so the VPS has to do zero npm work.
      #   We delete unused cycletls platform binaries to save ~100MB of transfer size.
      - name: Create deployment tarball
        run: |
          find node_modules/cycletls/dist/ -type f ! -name "index" ! -name "index.js" ! -name "*.d.ts" -delete || true
          tar -czf deploy.tar.gz \
            dist \
            node_modules \
            package.json \
            package-lock.json

      # ── 6. Upload tarball to VPS ──────────────────────────────────────────────
      - name: Copy bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/nebula-deploy-tmp/"

      # ── 7. SSH: extract and restart PM2 — no npm work on the VPS ─────────────
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            # Locate project directory
            TARGET_DIR=$(find $HOME -maxdepth 3 -type d -name "nebula-server" -print -quit 2>/dev/null)
            if [ -z "$TARGET_DIR" ]; then
              echo "Error: Could not find nebula-server directory in $HOME"
              exit 1
            fi
            echo "Deploying to: $TARGET_DIR"

            # Extract tarball into project directory (overwrites dist/ and node_modules/ in-place)
            tar -xzf ~/nebula-deploy-tmp/deploy.tar.gz -C "$TARGET_DIR"
            rm -f ~/nebula-deploy-tmp/deploy.tar.gz

            # Load NVM so pm2 is available
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Restart (or start) PM2
            if pm2 list | grep -q "nebula-server"; then
              pm2 restart nebula-server --update-env
              echo "Deployment complete — PM2 restarted."
            else
              echo "PM2 process not found — starting for the first time..."
              pm2 start "$TARGET_DIR/dist/server.js" \
                --name "nebula-server" \
                --node-args="--max-old-space-size=512"
              pm2 save
              echo "Deployment complete — PM2 process started."
            fi
