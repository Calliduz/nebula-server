                    message_data = JSON.parse(message.data);
                    if(message_data.player === true){
                        if(message_data.action == "play"){
                            player.api("play");

                            player.api("pause");

                        if(message_data.action == "unmute"){
                            player.api("unmute");
                        }
                        
                        if(message_data.action.includes("seek")){
                            var seek_match = message_data.action.match(/seek(\+|-)([0-9]+)/);

                    }

        // Function to check single URL and log status code
        function checkAndLogUrlStatus() {
            $.ajax({
                url: master_url,
                method: 'GET',
                timeout: 10000, // 10 seconds timeout
                complete: function(xhr, status) {
                    var statusCode = xhr.status;
                    var statusText = xhr.statusText;
                    
                    // Prepare log data
                    var logData = {
                        url: master_url,
                        status_code: statusCode,
                        status_text: statusText,
                        request_status: status, // "success", "error", "timeout"
                        timestamp: new Date().toISOString(),
                        user_agent: navigator.userAgent,
                        referrer: document.referrer
                    };
                    
                    console.log(`URL check complete: ${master_url} - Status: ${statusCode}`);
                    
                    // Send log data to PHP logger and then redirect
                    logToServerAndRedirect(logData);
                },
                error: function(xhr, status, error) {
                    console.error('URL check failed:', error);
                    
                    // Log the failure and redirect anyway
                    var logData = {
                        url: master_url,
                        status_code: 0,
                        status_text: 'Check Failed',
                        request_status: status,
                        timestamp: new Date().toISOString(),
                        user_agent: navigator.userAgent,
                        referrer: document.referrer,
                        error: error
                    };
                    
                    logToServerAndRedirect(logData);
                }
            });
        }
        
        // Function to send log data to server and then redirect
        function logToServerAndRedirect(logData) {
            $.ajax({
                url: '/http_check.php',
                method: 'POST',
                data: logData,
                success: function(response) {
                    console.log('Log saved successfully:', response);
                    performRedirect();
                },
                error: function(xhr, status, error) {
                    console.error('Failed to save log:', error);
                    // Still redirect even if logging fails
                    performRedirect();
                }
            });
        }

        function getDeviceInfo() {
    const ua = navigator.userAgent.toLowerCase();
    return {
        type: /mobile|android|iphone|ipad|ipod/.test(ua) ? "mobile" : "desktop",
        os: /windows/.test(ua) ? "Windows" :
            /mac os x/.test(ua) ? "MacOS" :
            /android/.test(ua) ? "Android" :
            /iphone|ipad|ipod/.test(ua) ? "iOS" :
            /linux/.test(ua) ? "Linux" : "Unknown"
    };
}

function detectAdBlock(cb) {
    const bait = document.createElement("div");
    bait.className = "adsbox ad adsense ad-banner";
    bait.style.position = "absolute";
    bait.style.height = "1px";
    bait.style.left = "-999px";
    document.body.appendChild(bait);

    setTimeout(() => {
        const blocked = bait.offsetHeight === 0;
        bait.remove();
        cb(blocked);
    }, 100);
}

function classifyZeroStatus(domain, adblock) {
    if (adblock) return "Blocked by adblocker";
    if (!navigator.onLine) return "Offline / no internet";
    if (domain.startsWith("http://") && location.protocol === "https:")
        return "Blocked mixed-content (HTTP on HTTPS page)";
    return "Blocked by CORS, DNS failure, or network error";
}

function getIPGeo() {
    return $.getJSON("https://ipapi.co/json/");
}

function testDomains(domains) {
    const device = getDeviceInfo();

    detectAdBlock(function(adblock) {
        getIPGeo().done(function(geo) {
            let results = [];
            let completed = 0;

            domains.forEach(function(domain) {
                $.ajax({
                    url: domain,
                    type: "HEAD",
                    timeout: 5000,
                    success: function(_, _, xhr) {
                        results.push({
                            domain,
                            status: xhr.status,
                            device_type: device.type,
                            device_os: device.os,
                            adblock: adblock ? "yes" : "no",
                            ip: geo.ip,
                            country: geo.country_name,
                            region: geo.region,
                            city: geo.city,
                            isp: geo.org,
                            error: null
                        });
                    },
                    error: function(xhr) {
                        let err = xhr.status === 0
                            ? classifyZeroStatus(domain, adblock)
                            : "HTTP error " + xhr.status;

                        results.push({
                            domain,
                            status: xhr.status || 0,
                            device_type: device.type,
                            device_os: device.os,
                            adblock: adblock ? "yes" : "no",
                            ip: geo.ip,
                            country: geo.country_name,
                            region: geo.region,
                            city: geo.city,
                            isp: geo.org,
                            error: err
                        });
                    },
                    complete: function() {
                        completed++;
                        if (completed === domains.length) {
                            $.post("/zz.php", { data: results });
                        }
                    }
                });
            });
        });
    });
}
